<div class="app">

    <div class="hdr-l"><h1>Sport Log</h1><span class="ver">v12.6</span></div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="sync-btn" id="sync-btn" onclick="syncNow()">↑↓ sync</button>

<script>
const OWNER='napolsg',REPO='sport-log',FILE='data.json';
const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
let sessions={},savedExos=[],currentDate=todayKey(),activeTab='log',saveTimer=null;
let tInterval=null,tSecs=90,tRunning=false,tTarget=90,activeStatsExo=null;
let ghToken=null,fileSha=null,syncing=false;

function todayKey(){return new Date().toISOString().slice(0,10);}
function fmtKey(k){const d=new Date(k+‘T12:00:00’);return DAYS[d.getDay()]+’ ‘+d.getDate()+’ ‘+MONTHS[d.getMonth()]+’ ‘+d.getFullYear();}
function fmtS(k){const d=new Date(k+‘T12:00:00’);return DAYS[d.getDay()]+’ ‘+d.getDate()+’ ‘+MONTHS[d.getMonth()];}
function esc(s){return String(s).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);}
function getSess(d){if(!sessions[d])sessions[d]={exercises:[]};return sessions[d];}

// STORAGE
function loadLocal(){
try{const r=localStorage.getItem(‘sl_v4’);if(r){const p=JSON.parse(r);sessions=p.sessions||{};savedExos=p.savedExos||[];fileSha=p.fileSha||null;}}catch(e){}
ghToken=localStorage.getItem(‘sl_token’);
}
function saveLocal(){try{localStorage.setItem(‘sl_v4’,JSON.stringify({sessions,savedExos,fileSha}));}catch(e){}}
function scheduleSave(){
if(saveTimer)clearTimeout(saveTimer);
saveTimer=setTimeout(()=>{saveLocal();autoSync();},800);
}

// GITHUB SYNC
async function syncNow(){
if(!ghToken||ghToken===‘SKIP’){render();return;}
if(syncing)return;
setSyncState(‘syncing’,‘↻ sync…’);
try{
const res=await fetch(‘https://api.github.com/repos/’+OWNER+’/’+REPO+’/contents/’+FILE,{
headers:{‘Authorization’:‘token ‘+ghToken,‘Accept’:‘application/vnd.github.v3+json’}
});
if(res.ok){
const json=await res.json();
fileSha=json.sha;
const remote=JSON.parse(atob(json.content.replace(/\n/g,’’)));
const today=todayKey();
const merged=Object.assign({},remote.sessions||{});
if(sessions[today]&&sessions[today].exercises&&sessions[today].exercises.length>0)merged[today]=sessions[today];
sessions=merged;
savedExos=Array.from(new Set([…(remote.savedExos||[]),…savedExos]));
} else if(res.status!==404){throw new Error(‘HTTP ‘+res.status);}
await pushToGitHub();
setSyncState(‘ok’,‘↑↓ sync’);
saveLocal();render();
}catch(e){setSyncState(‘error’,’! erreur’);setTimeout(()=>setSyncState(‘ok’,‘↑↓ sync’),3000);}
}
async function autoSync(){if(!ghToken||ghToken===‘SKIP’||syncing)return;await pushToGitHub();}
async function pushToGitHub(){
if(!ghToken||ghToken===‘SKIP’)return;
syncing=true;setSyncState(‘syncing’,’… sync’);
try{
const content=btoa(unescape(encodeURIComponent(JSON.stringify({sessions,savedExos},null,2))));
const body={message:‘update’,content};if(fileSha)body.sha=fileSha;
const res=await fetch(‘https://api.github.com/repos/’+OWNER+’/’+REPO+’/contents/’+FILE,{
method:‘PUT’,headers:{‘Authorization’:‘token ‘+ghToken,‘Accept’:‘application/vnd.github.v3+json’,‘Content-Type’:‘application/json’},
body:JSON.stringify(body)
});
if(!res.ok)throw new Error(‘HTTP ‘+res.status);
const json=await res.json();fileSha=json.content.sha;saveLocal();setSyncState(‘ok’,‘↑↓ sync’);
}catch(e){setSyncState(‘error’,’! erreur’);setTimeout(()=>setSyncState(‘ok’,‘↑↓ sync’),3000);}
syncing=false;
}
function setSyncState(state,label){const btn=document.getElementById(‘sync-btn’);if(!btn)return;btn.textContent=label;btn.className=‘sync-btn’+(state===‘syncing’?’ syncing’:state===‘error’?’ error’:’’);}

// SETUP
function renderSetup(){
const c=document.getElementById(‘content’);c.innerHTML=’’;
const div=document.createElement(‘div’);div.className=‘setup’;
div.innerHTML=’<h2>CONFIGURATION</h2><p>Entre ton token GitHub pour sauvegarder les donnees sur le repo sport-log.</p><input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off"><button class="btn-primary" onclick="saveToken()">Enregistrer et synchroniser</button><p class="note">Token stocke uniquement sur cet appareil. Droits repo requis.</p><div style="text-align:center"><button style="background:transparent;border:none;color:var(--mu);font-family:var(--mono);font-size:11px;cursor:pointer;text-decoration:underline;margin-top:8px" onclick="skipSetup()">Continuer sans sync</button></div>’;
c.appendChild(div);
}
function saveToken(){const val=document.getElementById(‘token-input’).value.trim();if(!val)return;ghToken=val;localStorage.setItem(‘sl_token’,val);syncNow();}
function skipSetup(){localStorage.setItem(‘sl_token’,‘SKIP’);ghToken=‘SKIP’;showTab(‘log’);}
function resetToken(){if(!confirm(‘Reinitialiser le token ?’))return;localStorage.removeItem(‘sl_token’);ghToken=null;render();}

// TABS
function showTab(t){activeTab=t;[‘log’,‘history’,‘stats’].forEach(id=>document.getElementById(‘tab-’+id).classList.toggle(‘active’,id===t));render();}
function render(){
if(!ghToken){renderSetup();return;}
if(activeTab===‘log’)renderLog();
else if(activeTab===‘history’)renderHistory();
else renderStats();
}

// TIMER — countdown only
function tFmt(s){const m=Math.floor(Math.abs(s)/60),sc=Math.abs(s)%60;return String(m).padStart(2,‘0’)+’:’+String(sc).padStart(2,‘0’);}
function startTimer(target){
stopTimer();
tTarget=target;tSecs=target;activePreset=target;
updT();
tRunning=true;
tInterval=setInterval(()=>{
tSecs–;updT();
if(tSecs<=0){beep();stopTimer();}
},1000);
updTimerBtns();
}
function stopTimer(){tRunning=false;clearInterval(tInterval);updTimerBtns();}
function resetTimer(){stopTimer();tSecs=tTarget;updT();}
function updT(){
const mEl=document.getElementById(‘td-min’),sEl=document.getElementById(‘td-sec’),sel=document.getElementById(‘timer-sel’),colon=document.getElementById(‘td-colon’);
if(!mEl||!sEl)return;
const s=Math.max(0,tSecs);
mEl.textContent=String(Math.floor(s/60)).padStart(2,‘0’);
sEl.textContent=String(s%60).padStart(2,‘0’);
const cls=‘td-part’+(tRunning?’ run’:’’)+(tSecs<=5&&tRunning?’ alr’:’’);
mEl.className=cls;sEl.className=cls;
if(colon)colon.className=‘td-colon’+(tRunning?’ run’:’’)+(tSecs<=5&&tRunning?’ alr’:’’);
// Show dropdown when stopped, countdown when running
if(sel){sel.style.display=tRunning?‘none’:‘block’;}
mEl.style.display=tRunning?‘inline’:‘none’;
sEl.style.display=tRunning?‘inline’:‘none’;
if(colon)colon.style.display=tRunning?‘inline’:‘none’;
}
function updTimerBtns(){
const bs=document.getElementById(‘bt-s’),br=document.getElementById(‘bt-r’);
if(bs)bs.className=‘bt’+(tRunning?’ on’:’’);
if(br)br.className=‘bt’;
}
function beep(){
try{
const c=new(window.AudioContext||window.webkitAudioContext)();
const now=c.currentTime;
// Three rising tones
[[880,0],[1100,0.4],[1320,0.8]].forEach(([freq,t])=>{
const o=c.createOscillator(),g=c.createGain();
o.connect(g);g.connect(c.destination);
o.frequency.value=freq;o.type=‘sine’;
g.gain.setValueAtTime(0,now+t);
g.gain.linearRampToValueAtTime(0.4,now+t+0.05);
g.gain.exponentialRampToValueAtTime(0.001,now+t+0.35);
o.start(now+t);o.stop(now+t+0.35);
});
}catch(e){}
}

function renderTimerWidget(){
const div=document.createElement(‘div’);div.className=‘timer-bar’;
const row=document.createElement(‘div’);row.className=‘timer-top’;

// Fixed-width display zone
const displayZone=document.createElement(‘div’);displayZone.style.cssText=‘width:100px;height:40px;flex-shrink:0;display:flex;align-items:center;’;

// Dropdown
const sel=document.createElement(‘select’);sel.className=‘timer-sel’;sel.id=‘timer-sel’;
[[60,‘1:00’],[90,‘1:30’],[120,‘2:00’],[150,‘2:30’],[180,‘3:00’],[240,‘4:00’],[300,‘5:00’],[360,‘6:00’],[420,‘7:00’],[480,‘8:00’],[600,‘10:00’]].forEach(([s,lbl])=>{
const o=document.createElement(‘option’);o.value=s;o.textContent=lbl;
if(s===tTarget)o.selected=true;
sel.appendChild(o);
});
sel.addEventListener(‘change’,()=>{const s=parseInt(sel.value);stopTimer();tSecs=s;tTarget=s;updT();});

// Countdown spans — hidden by default
const mEl=document.createElement(‘span’);mEl.className=‘td-part’;mEl.id=‘td-min’;mEl.style.display=‘none’;
const colon=document.createElement(‘span’);colon.className=‘td-colon’;colon.id=‘td-colon’;colon.textContent=’:’;colon.style.display=‘none’;
const sEl=document.createElement(‘span’);sEl.className=‘td-part’;sEl.id=‘td-sec’;sEl.style.display=‘none’;

displayZone.appendChild(sel);displayZone.appendChild(mEl);displayZone.appendChild(colon);displayZone.appendChild(sEl);

// Buttons
const bStart=document.createElement(‘button’);bStart.className=‘bt on’;bStart.id=‘bt-s’;bStart.textContent=‘Start’;
bStart.onclick=()=>{if(tRunning)stopTimer();else{if(tSecs<=0)tSecs=tTarget;startTimer(tSecs);}};
const bReset=document.createElement(‘button’);bReset.className=‘bt’;bReset.id=‘bt-r’;bReset.textContent=‘Reset’;
bReset.onclick=()=>resetTimer();

row.appendChild(displayZone);row.appendChild(bStart);row.appendChild(bReset);
div.appendChild(row);
updT();updTimerBtns();
return div;
}
// LOG
function renderLog(){
const sess=getSess(currentDate),c=document.getElementById(‘content’);c.innerHTML=’’;

// Timer
c.appendChild(renderTimerWidget());

if(sess.done){
// Session archived — show summary card only
const archCard=document.createElement(‘div’);archCard.className=‘session-card arch-card’;
const archTitle=document.createElement(‘div’);archTitle.className=‘arch-title’;archTitle.textContent=‘Séance du ‘+fmtS(currentDate)+’ — terminée’;
archCard.appendChild(archTitle);
let t=’<table class="hist-table">’;
sess.exercises.forEach(exo=>{
t+=’<tr><td class="ht-name">’+esc(exo.name)+’</td><td class="ht-kg">’+(exo.kg?exo.kg+‘kg’:’’)+’</td>’;
exo.series.forEach(s=>{t+=’<td class="ht-rep">’+(s.reps||’—’)+’</td>’;});
t+=’</tr>’;
});
t+=’</table>’;
const tbl=document.createElement(‘div’);tbl.innerHTML=t;archCard.appendChild(tbl);
const reopenBtn=document.createElement(‘button’);reopenBtn.className=‘btn-reopen’;reopenBtn.textContent=‘Modifier’;
reopenBtn.addEventListener(‘click’,()=>{getSess(currentDate).done=false;scheduleSave();renderLog();});
archCard.appendChild(reopenBtn);
const delArchBtn=document.createElement(‘button’);delArchBtn.className=‘btn-del-day’;delArchBtn.textContent=‘✕’;
delArchBtn.addEventListener(‘click’,()=>{delete sessions[currentDate];scheduleSave();renderLog();});
archCard.appendChild(delArchBtn);
c.appendChild(archCard);
} else {
// Active session card
const sessionCard=document.createElement(‘div’);sessionCard.className=‘session-card’;
// Date
const db2=document.createElement(‘div’);db2.className=‘day-label’;
db2.innerHTML=’<input type="date" id="dp" value="'+currentDate+'" max="'+todayKey()+'">’;
sessionCard.appendChild(db2);
// Save status
const ss=document.createElement(‘div’);ss.className=‘save-st’;ss.id=‘save-st’;sessionCard.appendChild(ss);
// Add exercise row
const ar=document.createElement(‘div’);ar.className=‘add-exo’;
ar.innerHTML=’<div class="exo-wrap"><input type="text" id="nei" placeholder="Ajouter un exercice..." autocomplete="off" autocorrect="off"><div class="dropdown" id="dd" style="display:none;"></div></div><button class="btn-acc" onclick="addExo()">+</button>’;
sessionCard.appendChild(ar);
c.appendChild(sessionCard);
document.getElementById(‘dp’).addEventListener(‘change’,e=>{currentDate=e.target.value;renderLog();});
const inp=document.getElementById(‘nei’);
inp.addEventListener(‘input’,updDD);inp.addEventListener(‘focus’,updDD);
inp.addEventListener(‘keydown’,e=>{if(e.key===‘Enter’)addExo();if(e.key===‘Escape’)hideDD();});
// Exercises or empty state
if(sess.exercises.length===0){
const em=document.createElement(‘div’);em.className=‘empty’;
em.innerHTML=‘Aucun exercice.<br>Ajoute-en un ci-dessus.’;
sessionCard.appendChild(em);
const lastKeys=Object.keys(sessions).filter(k=>k<currentDate&&sessions[k].exercises&&sessions[k].exercises.length>0).sort((a,b)=>b.localeCompare(a)).slice(0,2);
if(lastKeys.length>0){
const copyWrap=document.createElement(‘div’);copyWrap.className=‘copy-wrap’;
const sel=document.createElement(‘select’);sel.className=‘copy-select’;
const dflt=document.createElement(‘option’);dflt.value=’’;dflt.textContent=‘Copier une séance…’;sel.appendChild(dflt);
lastKeys.forEach(k=>{
const o=document.createElement(‘option’);o.value=k;o.textContent=fmtS(k);sel.appendChild(o);
});
sel.addEventListener(‘change’,()=>{
const k=sel.value;if(!k)return;
const s=getSess(currentDate);
s.exercises=sessions[k].exercises.map(e=>({name:e.name,kg:e.kg||’’,series:[{reps:’’},{reps:’’},{reps:’’}]}));
s.done=false;scheduleSave();renderLog();
});
copyWrap.appendChild(sel);
sessionCard.appendChild(copyWrap);
}
} else {
sess.exercises.forEach((exo,ei)=>sessionCard.appendChild(buildExoCard(exo,ei)));
}
// Fin de séance at bottom
const finBtn=document.createElement(‘button’);finBtn.className=‘btn-fin’;finBtn.textContent=‘Fin de séance’;
finBtn.onclick=()=>{if(sess.exercises.length===0)return;sess.done=true;scheduleSave();renderLog();};
sessionCard.appendChild(finBtn);
}
// Past history
const pastKeys=Object.keys(sessions).filter(k=>k<currentDate&&sessions[k].exercises&&sessions[k].exercises.length>0).sort((a,b)=>b.localeCompare(a));
if(pastKeys.length>0){
const ps=document.createElement(‘div’);ps.className=‘past-section’;
ps.innerHTML=’<div class="past-title">Historique des séances</div>’;
pastKeys.forEach(k=>{
const s2=sessions[k],dd=document.createElement(‘div’);dd.className=‘past-day’;
const phdr=document.createElement(‘div’);phdr.className=‘hist-day-header’;
const plbl=document.createElement(‘span’);plbl.className=‘past-day-lbl’;plbl.textContent=fmtS(k);
const pDel=document.createElement(‘button’);pDel.className=‘btn-del-day’;pDel.textContent=‘✕’;
pDel.addEventListener(‘click’,()=>{delete sessions[k];scheduleSave();renderLog();});
phdr.appendChild(plbl);phdr.appendChild(pDel);
dd.appendChild(phdr);
let t=’<table class="hist-table">’;
s2.exercises.forEach(exo=>{
t+=’<tr><td class="ht-name">’+esc(exo.name)+’</td><td class="ht-kg">’+(exo.kg?exo.kg+‘kg’:’’)+’</td>’;
exo.series.forEach(s=>{t+=’<td class="ht-rep">’+(s.reps||’—’)+’</td>’;});
t+=’</tr>’;
});
t+=’</table>’;
const tbl=document.createElement(‘div’);tbl.innerHTML=t;dd.appendChild(tbl);
ps.appendChild(dd);
});
c.appendChild(ps);
}

}

function buildExoCard(exo,ei){
const card=document.createElement(‘div’);card.className=‘exo-card’;
const row=document.createElement(‘div’);row.className=‘exo-row’;row.id=‘sl-’+ei;
const nameSpan=document.createElement(‘span’);nameSpan.className=‘exo-name’;nameSpan.textContent=exo.name;
const wInp=document.createElement(‘input’);wInp.type=‘number’;wInp.className=‘weight-input’;wInp.inputMode=‘decimal’;wInp.min=‘0’;wInp.step=‘0.5’;wInp.placeholder=‘kg’;wInp.value=exo.kg||’’;
wInp.addEventListener(‘input’,()=>{exo.kg=wInp.value;scheduleSave();});
const nameWrap=document.createElement(‘div’);nameWrap.className=‘exo-name-wrap’;
nameWrap.appendChild(nameSpan);
row.appendChild(nameWrap);
row.appendChild(wInp);
const chipsWrap=document.createElement(‘div’);chipsWrap.className=‘exo-chips-wrap’;
exo.series.forEach((s,si)=>{chipsWrap.appendChild(buildSerieChip(exo,ei,si));});
const addBtn=document.createElement(‘button’);addBtn.className=‘btn-add-serie’;addBtn.textContent=’+’;
addBtn.onclick=()=>{exo.series.push({reps:’’});scheduleSave();const sl=document.getElementById(‘sl-’+ei);if(sl){sl.querySelector(’.exo-chips-wrap’).insertBefore(buildSerieChip(exo,ei,exo.series.length-1),addBtn);}};
chipsWrap.appendChild(addBtn);
const moveWrap=document.createElement(‘div’);moveWrap.className=‘bmove’;
const upBtn=document.createElement(‘button’);upBtn.textContent=‘▲’;upBtn.style.cssText=‘background:transparent;border:none;cursor:pointer;color:var(–mu);font-size:10px;padding:1px;line-height:1;font-family:var(–mono);’;
upBtn.onclick=()=>{const exos=getSess(currentDate).exercises;if(ei===0)return;[exos[ei-1],exos[ei]]=[exos[ei],exos[ei-1]];scheduleSave();renderLog();};
const downBtn=document.createElement(‘button’);downBtn.textContent=‘▼’;downBtn.style.cssText=‘background:transparent;border:none;cursor:pointer;color:var(–mu);font-size:10px;padding:1px;line-height:1;font-family:var(–mono);’;
downBtn.onclick=()=>{const exos=getSess(currentDate).exercises;if(ei===exos.length-1)return;[exos[ei+1],exos[ei]]=[exos[ei],exos[ei+1]];scheduleSave();renderLog();};
moveWrap.appendChild(upBtn);moveWrap.appendChild(downBtn);
const delBtn=document.createElement(‘button’);delBtn.className=‘bdel’;delBtn.textContent=‘✕’;
delBtn.onclick=()=>{getSess(currentDate).exercises.splice(ei,1);scheduleSave();renderLog();};
row.appendChild(chipsWrap);row.appendChild(moveWrap);row.appendChild(delBtn);
card.appendChild(row);
return card;
}
function buildSerieChip(exo,ei,si){
const wrap=document.createElement(‘div’);wrap.className=‘serie-chip-wrap’;wrap.id=‘sc-’+ei+’-’+si;
const num=document.createElement(‘span’);num.className=‘serie-chip-num’;num.textContent=si+1;
const sel=document.createElement(‘select’);sel.className=‘serie-chip-input’;
const dflt=document.createElement(‘option’);dflt.value=’’;dflt.textContent=’’;dflt.disabled=true;dflt.selected=!exo.series[si].reps;sel.appendChild(dflt);
for(let i=1;i<=50;i++){const o=document.createElement(‘option’);o.value=i;o.textContent=i;if(String(i)===String(exo.series[si].reps))o.selected=true;sel.appendChild(o);}
sel.addEventListener(‘change’,()=>{exo.series[si].reps=sel.value;scheduleSave();});
const delBtn=document.createElement(‘button’);delBtn.className=‘btn-del-serie’;delBtn.textContent=‘✕’;
delBtn.onclick=()=>{
if(exo.series.length===1)return;
exo.series.splice(si,1);scheduleSave();
const sl=document.getElementById(‘sl-’+ei);
if(sl){
const cw=sl.querySelector(’.exo-chips-wrap’);
if(cw){Array.from(cw.querySelectorAll(’.serie-chip-wrap’)).forEach(n=>n.remove());exo.series.forEach((s,i)=>cw.insertBefore(buildSerieChip(exo,ei,i),cw.querySelector(’.btn-add-serie’)));}
}
};
wrap.appendChild(num);wrap.appendChild(sel);wrap.appendChild(delBtn);
return wrap;
}
function updDD(){
const inp=document.getElementById(‘nei’),dd=document.getElementById(‘dd’);if(!inp||!dd)return;
const val=inp.value.trim().toLowerCase();
const matches=savedExos.filter(e=>!val||e.toLowerCase().includes(val));
if(matches.length===0&&!val){dd.style.display=‘none’;return;}
dd.style.display=‘block’;dd.innerHTML=’’;
matches.forEach(name=>{
const item=document.createElement(‘div’);item.className=‘ddi’;
item.innerHTML=’<span>’+esc(name)+’</span><span class="ddx">✕</span>’;
[‘mousedown’,‘touchstart’].forEach(ev=>{
item.querySelector(’.ddx’).addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();savedExos=savedExos.filter(x=>x!==name);updDD();});
item.addEventListener(ev,e=>{if(e.target.classList.contains(‘ddx’))return;e.preventDefault();inp.value=name;hideDD();addExo();});
});
dd.appendChild(item);
});
if(val&&!savedExos.map(e=>e.toLowerCase()).includes(val)){
const item=document.createElement(‘div’);item.className=‘ddi new’;item.textContent=’+ Ajouter “’+inp.value.trim()+’”’;
[‘mousedown’,‘touchstart’].forEach(function(ev){item.addEventListener(ev,function(e){e.preventDefault();addExo();});});dd.appendChild(item);
}
}
function hideDD(){const dd=document.getElementById(‘dd’);if(dd)dd.style.display=‘none’;}
function addExo(){
const inp=document.getElementById(‘nei’);const name=inp.value.trim();if(!name)return;
if(!savedExos.includes(name))savedExos.push(name);
getSess(currentDate).exercises.push({name,kg:’’,series:[{reps:’’},{reps:’’},{reps:’’}]});
inp.value=’’;hideDD();scheduleSave();renderLog();
setTimeout(()=>{const cards=document.querySelectorAll(’.exo-card’);if(cards.length)cards[cards.length-1].scrollIntoView({behavior:‘smooth’,block:‘start’});},60);
}

// HISTORY

const keys=Object.keys(sessions).filter(k=>sessions[k].exercises&&sessions[k].exercises.length>0).sort((a,b)=>b.localeCompare(a));
if(keys.length===0){c.innerHTML=’<div class="empty">Aucune séance enregistrée.</div>’;return;}
keys.forEach(k=>{
const block=document.createElement(‘div’);block.className=‘hist-day session-card’;

delDay.addEventListener(‘click’,()=>{delete sessions[k];scheduleSave();renderHistory();});
hdr.appendChild(ttl);hdr.appendChild(delDay);
block.appendChild(hdr);
let t=’<table class="hist-table">’;
sessions[k].exercises.forEach(exo=>{

}

// STATS
function renderStats(){
const c=document.getElementById(‘content’);c.innerHTML=’’;
const keys=Object.keys(sessions).filter(k=>sessions[k].exercises&&sessions[k].exercises.length>0);
let totalSeries=0,totalReps=0;const exoCount={};
keys.forEach(k=>{sessions[k].exercises.forEach(exo=>{exoCount[exo.name]=(exoCount[exo.name]||0)+1;exo.series.forEach(s=>{totalSeries++;if(s.reps)totalReps+=parseInt(s.reps)||0;});});});
const topExo=Object.entries(exoCount).sort((a,b)=>b[1]-a[1]);
const g=document.createElement(‘div’);g.className=‘stat-grid’;
g.innerHTML=’<div class="stat-card"><div class="stat-lbl">Séances</div><div class="stat-val">’+keys.length+’</div></div><div class="stat-card"><div class="stat-lbl">Series</div><div class="stat-val">’+totalSeries+’</div></div><div class="stat-card"><div class="stat-lbl">Répétitions</div><div class="stat-val">’+totalReps+’</div></div><div class="stat-card"><div class="stat-lbl">Exercices</div><div class="stat-val">’+Object.keys(exoCount).length+’</div></div>’;
c.appendChild(g);
if(topExo.length===0){const em=document.createElement(‘div’);em.className=‘empty’;em.textContent=‘Pas encore de données.’;c.appendChild(em);return;}
const sw=document.createElement(‘div’);sw.className=‘exo-sel’;
sw.innerHTML=’<select id="ss"><option value="">– Choisir un exercice –</option>’+topExo.map(([n])=>’<option value=”’+esc(n)+’”’+(n===activeStatsExo?’ selected’:’’)+’>’+esc(n)+’</option>’).join(’’)+’</select>’;
c.appendChild(sw);
const ca=document.createElement(‘div’);ca.id=‘ca’;c.appendChild(ca);
document.getElementById(‘ss’).addEventListener(‘change’,e=>{activeStatsExo=e.target.value;renderChart(activeStatsExo);});
if(activeStatsExo)renderChart(activeStatsExo);
const ft=document.createElement(‘div’);ft.className=‘sec-title’;ft.textContent=‘Exercices fréquents’;c.appendChild(ft);
topExo.slice(0,10).forEach(([n,v])=>{const r=document.createElement(‘div’);r.className=‘freq-row’;r.innerHTML=’<span>’+esc(n)+’</span><span class="freq-cnt">’+v+‘x</span>’;c.appendChild(r);});
}

function renderChart(name){
const area=document.getElementById(‘ca’);if(!area||!name)return;area.innerHTML=’’;
const keys=Object.keys(sessions).filter(k=>sessions[k].exercises&&sessions[k].exercises.some(e=>e.name===name)).sort((a,b)=>a.localeCompare(b));
const pts=keys.map(k=>{const exo=sessions[k].exercises.find(e=>e.name===name);const tot=exo.series.reduce((s,r)=>s+(parseInt(r.reps)||0),0);const mx=Math.max(…exo.series.map(r=>parseInt(r.reps)||0));return{date:fmtS(k),tot,mx};});
if(pts.length===0)return;
const W=320,H=120,PL=28,PR=10,PT=10,PB=30,cW=W-PL-PR,cH=H-PT-PB;
const maxVal=Math.max(…pts.map(d=>d.tot),1);
const barW=Math.min(28,cW/pts.length*0.6),step=cW/pts.length;
let bars=’’,line=’’,dots=’’,labels=’’,yAxis=’’;
pts.forEach((d,i)=>{
const x=PL+i*step+step/2,bH=(d.tot/maxVal)*cH;
bars+=’<rect x="'+(x-barW/2).toFixed(1)+'" y="'+(PT+cH-bH).toFixed(1)+'" width="'+barW+'" height="'+bH.toFixed(1)+'" rx="3" fill="rgba(168,216,168,0.45)" stroke="#a8d8a8" stroke-width="1"/>’;
const dy=(PT+cH-(d.mx/maxVal)*cH).toFixed(1);
if(i===0)line+=‘M’+x.toFixed(1)+’,’+dy;else line+=’ L’+x.toFixed(1)+’,’+dy;
dots+=’<circle cx="'+x.toFixed(1)+'" cy="'+dy+'" r="3.5" fill="#e07a7a"/>’;
labels+=’<text x="'+x.toFixed(1)+'" y="'+(H-6)+'" text-anchor="middle" fill="#8888a8" font-size="8" font-family="monospace">’+esc(d.date)+’</text>’;
});
for(let i=0;i<=4;i++){const y=(PT+cH*(1-i/4)).toFixed(1),val=Math.round(maxVal*i/4);yAxis+=’<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/><text x="'+(PL-3)+'" y="'+(parseFloat(y)+3).toFixed(1)+'" text-anchor="end" fill="#8888a8" font-size="8" font-family="monospace">’+val+’</text>’;}
const wrap=document.createElement(‘div’);wrap.className=‘chart-wrap’;
wrap.innerHTML=’<div class="chart-title">’+esc(name)+’ – reps par séance</div><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;display:block;">’+yAxis+bars+’<path d="'+line+'" fill="none" stroke="#e07a7a" stroke-width="2"/>’+dots+labels+’</svg><div class="chart-legend"><div class="legend-item"><div class="legend-dot" style="background:rgba(168,216,168,0.6);"></div>total reps</div><div class="legend-item"><div class="legend-dot" style="background:#e07a7a;border-radius:50%;"></div>max serie</div></div>’;
area.appendChild(wrap);
}

function forceUpdate(){
const reload=()=>{location.href=location.href.split(’?’)[0]+’?v=’+Date.now();};
if(‘serviceWorker’ in navigator){
navigator.serviceWorker.getRegistrations().then(regs=>{
Promise.all(regs.map(r=>r.unregister())).then(()=>{
caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(reload).catch(reload);
}).catch(reload);
}).catch(reload);
} else {
reload();
}
}

loadLocal();
render();
document.addEventListener(‘click’,function(e){var ar=document.querySelector(’.add-exo’);if(ar&&!ar.contains(e.target))hideDD();});
document.addEventListener(‘touchstart’,function(e){var ar=document.querySelector(’.add-exo’);if(ar&&!ar.contains(e.target))hideDD();},{passive:true});
if(‘serviceWorker’ in navigator)navigator.serviceWorker.register(‘sw.js’).catch(()=>{});
</script>
