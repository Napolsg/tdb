name: Notification tâche

on:
  push:
    paths:
      - 'tasks.json'
      # NE PAS ajouter config.json ici — notify.js écrit dans config.json
      # ce qui créerait une boucle infinie de notifications
  workflow_dispatch:
    inputs:
      task_id:
        description: 'ID de la tâche'
        required: true
      to_email:
        description: 'Email destinataire'
        required: true
      notif_type:
        description: 'Type: assigned ou completed'
        required: true
        default: 'assigned'

# Un seul job notify actif à la fois par type d'événement.
# Pour les push : annule le job en attente si un nouveau push arrive (cancel-in-progress).
# Pour les workflow_dispatch : pas d'annulation (notifications manuelles indépendantes).
concurrency:
  group: notify-${{ github.event_name }}-${{ github.event_name == 'push' && 'push' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Attendre 30s pour grouper les pushs rapprochés
        if: github.event_name == 'push'
        run: sleep 30
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install nodemailer @octokit/rest
      - name: Envoyer notification
        env:
          GMAIL_USER_NAPO: ${{ secrets.GMAIL_USER_NAPO }}
          GMAIL_PASSWORD_NAPO: ${{ secrets.GMAIL_PASSWORD_NAPO }}
          GMAIL_USER_BITCHOUN: ${{ secrets.GMAIL_USER_BITCHOUN }}
          GMAIL_PASSWORD_BITCHOUN: ${{ secrets.GMAIL_PASSWORD_BITCHOUN }}
          TASK_ID: ${{ inputs.task_id }}
          TO_EMAIL: ${{ inputs.to_email }}
          NOTIF_TYPE: ${{ inputs.notif_type }}
          GITHUB_EVENT: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node notify.js
